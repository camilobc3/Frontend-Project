<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
        <title>Seleccionar Ciudad - City Builder</title>    
        <!-- Tailwind CSS -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <script type="module" src="../../controllers/CiudadController.js" defer></script>
        <script type="module" src="../ui/MenuCiudades.js" defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    </head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white font-[Exo_2] min-h-screen">
    <!-- ======================= NAVBAR SUPERIOR ======================= -->
    <nav class="bg-slate-900/80 backdrop-blur-lg border-b border-slate-700">
        <div class="flex items-center px-4 py-4">
    
            <button id="btnMobileMenu" class="md:hidden text-xl hover:text-indigo-400 transition">☰</button>

            <span class="text-2xl font-bold flex items-center gap-2 ml-2">🏢 City Builder</span>

            <button id="cerrar-sesion" class="ml-auto bg-red-500 hover:bg-red-600 text-white py-2 px-4 rounded-lg transition">Cerrar sesión</button>

        </div>
    </nav>

    <!-- ======================= CONTENEDOR PRINCIPAL ======================= -->
    <div class="min-h-screen lg:grid lg:grid-cols-[260px_1fr]">
        
        <!-- ======================= SIDEBAR IZQUIERDO (DESKTOP) ======================= -->
        <aside class="hidden lg:flex lg:w-full flex-col p-6 space-y-6 bg-slate-900/60 backdrop-blur-lg border-r border-slate-700">
            <!-- Avatar Circular -->
            <div class="w-40 h-40 rounded-full mx-auto overflow-hidden">
                <img src="../assets/Armando.png" class="w-full h-full object-cover object-center" alt="">
            </div>
            
            <!-- Nombre de Usuario -->
            <div>
                <h4 class="text-xl font-bold text-center" id="nombreUsuario">Jugador 1</h4>
            </div>
            
            <!-- Información adicional del usuario -->
            <div class="bg-slate-800/50 p-4 rounded-lg space-y-2">
                <div class="flex justify-between">
                    <span class="text-slate-400">Ciudades:</span>
                    <span class="font-bold text-indigo-400" id="ciudadCount">3</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">Nivel:</span>
                    <span class="font-bold text-indigo-400" id="userLevel">1</span>
                </div>
            </div>

            <button id="btnCargarMapa" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-2 px-4 rounded-lg transition font-semibold">
                Cargar mapa
            </button>
        </aside>

        <!-- ======================= SIDEBAR OFFCANVAS (MOBILE) ======================= -->
        <div id="sidebarMobile" class="fixed inset-0 z-40 transform -translate-x-full transition-transform duration-300 md:hidden">
            <!-- Overlay -->
            <div id="sidebarOverlay" class="absolute inset-0 bg-black/50"></div>
            
            <!-- Panel -->
            <div class="absolute left-0 top-0 w-64 h-full bg-slate-900/95 backdrop-blur-lg border-r border-slate-700 overflow-y-auto">
                <div class="p-6 space-y-6">
                    <div class="flex items-center justify-between">
                        <h5 class="text-lg font-bold">Perfil</h5>
                        <button id="btnCloseMobileMenu" class="text-2xl hover:text-indigo-400">✕</button>
                    </div>
                    
                    <div class="w-32 h-32 rounded-full mx-auto overflow-hidden">
                        <img src="../assets/Armando.png" class="w-full h-full object-cover object-center" alt="">
                    </div>
                    
                    <div>
                        <h4 class="text-lg font-bold text-center" id="nombreUsuarioMobile">Jugador 1</h4>
                    </div>
                    
                    <div class="bg-slate-800/50 p-4 rounded-lg space-y-2">
                        <div class="flex justify-between">
                            <span class="text-slate-400">Ciudades:</span>
                            <span class="font-bold text-indigo-400" id="ciudadCountMobile">3</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-slate-400">Nivel:</span>
                            <span class="font-bold text-indigo-400" id="userLevelMobile">5</span>
                        </div>
                    </div>

                    <button id="btnCargarMapaMobile" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-2 px-4 rounded-lg transition font-semibold">
                        Cargar mapa
                    </button>
                </div>
            </div>
        </div>

        <!-- ======================= ÁREA PRINCIPAL CON GRILLA ======================= -->
        <main class="p-5 md:p-8 lg:p-8">
            <section class="hidden md:block lg:hidden mb-6">
                <div class="rounded-xl border border-slate-700 bg-slate-900/50 p-4">
                    <div class="grid grid-cols-3 gap-3">
                        <div class="rounded-lg bg-slate-800/70 p-3 text-center">
                            <p class="text-xs uppercase tracking-wide text-slate-400">Jugador</p>
                            <p id="nombreUsuarioTablet" class="mt-1 font-semibold">Jugador 1</p>
                        </div>
                        <div class="rounded-lg bg-slate-800/70 p-3 text-center">
                            <p class="text-xs uppercase tracking-wide text-slate-400">Ciudades</p>
                            <p id="ciudadCountTablet" class="mt-1 font-semibold text-indigo-400">3</p>
                        </div>
                        <button id="btnCargarMapaTablet" class="rounded-lg bg-indigo-600 hover:bg-indigo-500 transition p-3 font-semibold">
                            Cargar mapa
                        </button>
                    </div>
                </div>
            </section>

            <!-- Encabezado de la sección -->
            <div class="mb-8">
                <h2 class="text-4xl font-bold mb-2">Selecciona una ciudad</h2>
                <p class="text-slate-400">O crea una nueva para comenzar</p>
            </div>

            <!-- Grilla de Ciudades -->
            <div class="w-full">
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="gridCiudades">

                    <!-- Tarjeta Nueva Ciudad (+) -->
                    <div id="btnNuevaCiudad" class="group cursor-pointer rounded-xl overflow-hidden bg-slate-800/50 border-2 border-dashed border-slate-600 hover:border-indigo-500 hover:bg-slate-800 transition-all duration-300 flex items-center justify-center min-h-[224px]">
                        <div class="text-center">
                            <div class="text-5xl mb-2">+</div>
                            <div class="text-center font-semibold text-lg">Nueva Ciudad</div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>
</body>
</html>
