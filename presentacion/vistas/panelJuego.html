<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">

            <!-- Columna 1: 3 unidades, 2 filas -->
            <div class="col-lg-3 col-md-3 col-sm-12">
                <div class="row">
                    <div class="col-12">
                        <div class="p-2 border">Columna 1 - Fila 1</div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <div class="p-2 border">Columna 1 - Fila 2</div>
                    </div>
                </div>
            </div>

            <!-- Columna 2: 6 unidades, vacía -->
            <div class="col-lg-6 col-md-6 col-sm-12">
                <img src="https://www.shutterstock.com/image-vector/map-green-modern-city-path-home-1666456714" alt="Mapa del juego">
            </div>

            <!-- Columna 3: 3 unidades, 3 filas -->
            <div class="col-lg-3 col-md-3 col-sm-12">
                <div class="row">
                    <div class="col-12">
                        <div class="p-2 border">Columna 3 - Fila 1</div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <div class="p-2 border">Columna 3 - Fila 2</div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <div class="p-2 border">Columna 3 - Fila 3</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
