<!DOCTYPE html>
<html lang="en">
    <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Builder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="module" src="../../controllers/MapaController.js"></script>

    </head>


    <body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white font-[Exo_2] min-h-screen">

        <div class="grid grid-cols-12 min-h-screen">

            <!-- SIDEBAR IZQUIERDA -->

            <aside class="col-span-2 p-4 space-y-6 bg-slate-900/60 backdrop-blur-lg border-r border-slate-700">

            <h1 class="text-xl font-bold text-center">City Builder</h1>

            <!-- Recursos -->

                <div class="bg-slate-800 p-4 rounded-xl shadow">

                    <h2 class="font-semibold mb-3 text-slate-300">Resources</h2>

                    <div class="space-y-2 text-sm">

                        <div class="flex justify-between"> 
                            <span>💵 Dinero</span> 
                            <span id="dinero">5000</span> 
                        </div>

                        <div class="flex justify-between"> 
                            <span>👥 Poblacion</span> 
                            <span id="poblacion">150</span> 
                        </div>

                        <div class="flex justify-between"> 
                            <span>⚡ Energia</span> 
                            <span id="energia">75</span> 
                        </div>

                        <div class="flex justify-between"> 
                            <span>⚡ Energia</span> 
                            <span id="energia">75</span> 
                        </div>

                        <div class="flex justify-between"> 
                            <span>😄 Felicidad</span>
                            <span id="felicidad">75</span> 
                        </div>

                    </div>

                </div>

                    <!-- Construcción -->

                <div class="bg-slate-800 p-4 rounded-xl shadow">

                    <h2 class="font-semibold mb-3 text-slate-300">Build</h2>

                    <div class="grid grid-cols-2 gap-2">

                        <button class="bg-slate-700 hover:bg-indigo-600 transition rounded-lg p-3">
                        🏠 House
                        </button>

                    <button class="bg-slate-700 hover:bg-indigo-600 transition rounded-lg p-3">
                    🏭 Factory
                    </button>

                    <button class="bg-slate-700 hover:bg-indigo-600 transition rounded-lg p-3">
                    🏪 Store
                    </button>

                    <button class="bg-slate-700 hover:bg-indigo-600 transition rounded-lg p-3">
                    🌾 Farm
                    </button>

                    <button class="bg-slate-700 hover:bg-indigo-600 transition rounded-lg p-3 col-span-2">
                    🏢 Apartment
                    </button>

                    </div>

                </div>

            </aside>


        <!-- MAPA -->

        <main class="col-span-8 flex items-center justify-center">

        <div class="relative">

        <div class="absolute top-3 right-3 flex flex-col gap-2">

        <button id="btnZoomIn" class="bg-slate-700 hover:bg-indigo-600 rounded-lg px-3 py-1">
        +
        </button>

        <button id="btnZoomOut" class="bg-slate-700 hover:bg-indigo-600 rounded-lg px-3 py-1">
        -
        </button>

        </div>

        <div id="gameMap"
        class="w-[700px] h-[700px] bg-slate-800 border border-slate-600 rounded-xl shadow-2xl">
        </div>

        </div>

        </main>


        <!-- SIDEBAR DERECHA -->

        <aside class="col-span-2 p-4 space-y-6 bg-slate-900/60 backdrop-blur-lg border-l border-slate-700">

        <!-- Clima -->

        <div class="bg-slate-800 p-4 rounded-xl text-center shadow">

        <div class="text-4xl">☀️</div>

        <div class="text-xl font-semibold">24°C</div>

        <div class="text-sm text-slate-400">Sunny</div>

        </div>

        <!-- Stats -->

        <div class="bg-slate-800 p-4 rounded-xl shadow">

        <h2 class="font-semibold mb-3 text-slate-300">City Stats</h2>

        <div class="space-y-2 text-sm">

        <div class="flex justify-between">
        <span>Happiness</span>
        <span>85%</span>
        </div>

        <div class="flex justify-between">
        <span>Employment</span>
        <span>92%</span>
        </div>

        <div class="flex justify-between">
        <span>Total Buildings</span>
        <span id="buildingCountDesktop">5</span>
        </div>

        </div>

        </div>

        <!-- Noticias -->

        <div class="bg-slate-800 p-4 rounded-xl shadow">

        <h2 class="font-semibold mb-3 text-slate-300">News</h2>

        <div class="space-y-2 text-sm text-slate-300">

        <p>Factory completed</p>
        <p>Population reached 150</p>
        <p>Energy production increased</p>

        </div>

        </div>

        </aside>

        </div>

    </body>
</html>
