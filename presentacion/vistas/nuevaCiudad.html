<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulario</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script type="module" src="../../api/RegionesApi.js" defer></script>    
        <script type="module" src="../../controllers/CiudadController.js" defer></script>
        <script type="module" src="../../controllers/MapaController.js" defer></script>

    </head>

    <body class="bg-slate-900 min-h-screen flex items-center py-6 md:py-10">

        <div class="container mx-auto px-4 md:px-6">

            <div class="mx-auto grid max-w-5xl grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-5">

                <section class="hidden md:flex lg:col-span-2 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-700 p-6 md:p-8 shadow-xl flex-col justify-between">
                    <div>
                        <p class="text-xs uppercase tracking-[0.2em] text-slate-400">City Builder</p>
                        <h1 class="mt-3 text-3xl font-bold text-white">Diseña tu siguiente ciudad</h1>
                        <p class="mt-4 text-sm text-slate-300">En tablet tendrás este panel de ayuda, mientras que en móvil se prioriza el formulario y en desktop se amplía el área de configuración.</p>
                    </div>

                    <ul class="space-y-2 text-sm text-slate-300">
                        <li>Selecciona tamaño de mapa</li>
                        <li>Escoge región geográfica</li>
                        <li>Carga un mapa existente si ya tienes uno</li>
                    </ul>
                </section>

                <div class="bg-slate-800 rounded-2xl shadow-xl p-6 md:p-8 lg:col-span-3">

                <h2 class="text-2xl font-bold text-center text-white mb-6">CREAR CIUDAD</h2>
                    
                <form id="createCityForm" class="space-y-5">

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Nickname</label>
                        <input id="nickname" type="text" placeholder="Nickname" class="w-full px-4 py-2 rounded-lg bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Nombre de la ciudad</label>
                        <input id="cityName" type="text" placeholder="Nombre de la ciudad" class="w-full px-4 py-2 rounded-lg bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Tamaño del mapa</label>
                        <select id="mapSize" name="mapSize" class="w-full px-4 py-2 rounded-lg bg-slate-700 border text-slate-300 border-slate-600 focus:outline-none focus:border-blue-500">
                            <option value="">Selecciona un tamaño</option>
                            <option value="15x15">15 x 15</option>
                            <option value="30x30">30 x 30</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Region geografica</label>
                        <select id="region" name="region" class="w-full px-4 py-2 rounded-lg bg-slate-700 text-slate-300 border border-slate-600 focus:outline-none focus:border-blue-500">
                            <option value="">Selecciona una region</option>
                        </select>
                    </div>

                    <button id="Crear-ciudad" type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">
                        Crear ciudad
                    </button>

                </form>

                <!-- Separador -->
                <div class="flex items-center my-6 gap-3">
                    <div class="flex-1 h-px bg-slate-600"></div>
                    <span class="text-slate-400 text-sm">o</span>
                    <div class="flex-1 h-px bg-slate-600"></div>
                </div>

                <!-- Botón cargar mapa -->
                <button id="btnCargarMapa" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition flex items-center justify-center gap-2">
                    <span>📂</span> Cargar mapa desde archivo
                </button>

                </div>

            </div>

        </div>   
     
    </body>
</html>
