<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>

    <body class="bg-gradient-to-r from-blue-100 to-indigo-200 min-h-screen flex items-center">

    <div class="container mx-auto px-4">

        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8">

            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
                Crear ciudad
            </h2>

            <form class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Nickname
                    </label>
                    <input
                        type="text"
                        placeholder="Tu nickname"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Nombre de la ciudad
                    </label>
                    <input
                        type="text"
                        placeholder="Nombre de la ciudad"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Tamaño del mapa
                    </label>
                    <select
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                        <option value="">Selecciona un tamaño</option>
                        <option value="15x15">15 x 15</option>
                        <option value="30x30">30 x 30</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Región geográfica
                    </label>

                    <!-- falta integrar la api -->
                    <select>
                        id="region"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                        <option value="">Cargando regiones...</option>
                    </select>
                </div>

                <button
                    type="submit"
                    class="w-full bg-indigo-500 text-white py-2 rounded-lg font-semibold hover:bg-indigo-600 transition">
                    Continuar
                </button>

            </form>

        </div>

    </div>

    </body>
</html>
